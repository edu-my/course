<!DOCTYPE html>
<html lang="en">
<!-- ========================================================
     FILE: certificates.html
     PURPOSE: Student certificates page — lists all earned
              certificates with download button for each.
     ======================================================== -->
<head>
  <!-- #### HEAD META #### -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Certificates — iCraftCourse</title>
  <!-- #### END HEAD META #### -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <!-- #### PAGE STYLES #### -->
  <style>
    .page-header{background:var(--dark);padding:2.5rem var(--page-padding);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:1.5px;color:white;margin-bottom:0.25rem;}
    .page-header p{color:rgba(255,255,255,0.5);font-size:0.9rem;}
    .certs-wrap{padding:3rem var(--page-padding);max-width:1100px;margin:0 auto;}
    .certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .cert-card{background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-light);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform 0.2s,box-shadow 0.2s;}
    .cert-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-red);}
    .cert-card-header{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:2rem;text-align:center;position:relative;}
    .cert-trophy{font-size:3rem;margin-bottom:0.5rem;}
    .cert-card-header h3{color:white;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
    .cert-card-body{padding:1.25rem;}
    .cert-course-name{font-weight:700;font-size:1rem;color:var(--dark);margin-bottom:0.4rem;line-height:1.4;}
    .cert-meta{font-size:0.8rem;color:var(--gray);margin-bottom:0.5rem;}
    .cert-id{font-size:0.72rem;color:var(--gray-mid);font-family:monospace;background:var(--off-white);padding:0.25rem 0.5rem;border-radius:4px;display:inline-block;}
    .cert-card-footer{padding:1rem 1.25rem;border-top:1px solid var(--gray-light);display:flex;gap:0.75rem;}
    .empty-state{text-align:center;padding:4rem 1rem;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-light);}
    .empty-state .empty-icon{font-size:4rem;margin-bottom:1rem;}
    .empty-state h3{font-size:1.2rem;margin-bottom:0.5rem;}
    .empty-state p{font-size:0.88rem;color:var(--gray);margin-bottom:1.5rem;}
    @media(max-width:900px){.certs-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:600px){.certs-grid{grid-template-columns:1fr;}}
  </style>
  <!-- #### END PAGE STYLES #### -->
</head>
<body>

  <!-- #### NAVBAR #### -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">iCraft<span>Course</span></a>
    <div class="nav-links">
      <a href="index.html"     class="nav-link">Home</a>
      <a href="courses.html"   class="nav-link">Courses</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
    </div>
    <div class="nav-actions hidden" id="nav-guest">
      <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="nav-avatar" id="nav-avatar-initials">U</div>
      <div class="nav-user-name" id="nav-user-name">User</div>
      <div class="nav-dropdown">
        <div class="nav-dropdown-header">
          <div class="nav-dropdown-name"  id="dropdown-name">User</div>
          <div class="nav-dropdown-email" id="dropdown-email">user@email.com</div>
        </div>
        <a href="dashboard.html"    class="nav-dropdown-item"><span class="item-icon">📊</span> My Dashboard</a>
        <a href="certificates.html" class="nav-dropdown-item"><span class="item-icon">🏆</span> My Certificates</a>
        <a href="profile.html"      class="nav-dropdown-item"><span class="item-icon">👤</span> My Profile</a>
        <button class="nav-dropdown-item danger" id="btn-logout"><span class="item-icon">🚪</span> Log Out</button>
      </div>
    </div>
    <button class="nav-hamburger" id="nav-hamburger"><span></span><span></span><span></span></button>
  </nav>
  <!-- #### END NAVBAR #### -->

  <!-- #### MOBILE DRAWER #### -->
  <div class="nav-mobile-drawer" id="nav-mobile-drawer">
    <a href="index.html"     class="nav-link">Home</a>
    <a href="courses.html"   class="nav-link">Courses</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <div class="hidden" id="nav-mobile-user">
      <button class="btn btn-secondary" id="btn-logout-mobile">🚪 Log Out</button>
    </div>
  </div>
  <!-- #### END MOBILE DRAWER #### -->

  <!-- #### PAGE HEADER #### -->
  <div class="page-header">
    <div>
      <h1>MY CERTIFICATES</h1>
      <p>Your earned CPD certificates — download anytime.</p>
    </div>
    <a href="courses.html" class="btn btn-primary">Earn More Certificates</a>
  </div>
  <!-- #### END PAGE HEADER #### -->

  <!-- #### CERTIFICATES CONTENT #### -->
  <div class="certs-wrap">
    <div class="certs-grid" id="certs-grid">
      <div class="loading-text" style="grid-column:1/-1;padding:2rem;justify-content:center;">
        <div class="spinner spinner-sm"></div>&nbsp;Loading certificates...
      </div>
    </div>
  </div>
  <!-- #### END CERTIFICATES CONTENT #### -->

  <!-- #### CERTIFICATES SCRIPTS #### -->
  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // #### FIREBASE SETUP ####
    const firebaseConfig = {
      apiKey:"AIzaSyCpXYFftiB-agrY44eGKdFyUPm-t7FXbUk",
      authDomain:"kolamdata.firebaseapp.com",
      projectId:"kolamdata",
      storageBucket:"kolamdata.firebasestorage.app",
      messagingSenderId:"16403132310",
      appId:"1:16403132310:web:464c4ad2d19812f95077b7"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    // #### END FIREBASE SETUP ####

    // #### AUTH GUARD ####
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href="login.html"; return; }
      const name=user.displayName||"User";
      document.getElementById("nav-guest").classList.add("hidden");
      document.getElementById("nav-user").classList.remove("hidden");
      document.getElementById("nav-user-name").textContent       = name;
      document.getElementById("nav-avatar-initials").textContent = name.charAt(0).toUpperCase();
      document.getElementById("dropdown-name").textContent       = name;
      document.getElementById("dropdown-email").textContent      = user.email;
      await loadCertificates(user);
    });
    // #### END AUTH GUARD ####

    // #### LOAD CERTIFICATES ####
    async function loadCertificates(user) {
      const grid = document.getElementById("certs-grid");
      try {
        const q    = query(collection(db,"certificates"), where("userId","==",user.uid));
        const snap = await getDocs(q);
        const certs = [];
        snap.forEach(d => certs.push({id:d.id,...d.data()}));

        if (certs.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-icon">🏆</div>
              <h3>No certificates yet</h3>
              <p>Complete a course to earn your first CPD certificate!</p>
              <a href="courses.html" class="btn btn-primary">Browse Courses</a>
            </div>`;
          return;
        }

        grid.innerHTML = certs.map(cert => {
          const date = cert.issuedAt?.toDate
            ? cert.issuedAt.toDate().toLocaleDateString("en-MY", {day:"numeric",month:"long",year:"numeric"})
            : "—";
          return `
            <div class="cert-card">
              <div class="cert-card-header">
                <div class="cert-trophy">🏆</div>
                <h3>Certificate of<br/>Completion</h3>
              </div>
              <div class="cert-card-body">
                <div class="cert-course-name">${cert.courseName||"Course"}</div>
                <div class="cert-meta">Issued to: <strong>${cert.userName||"Student"}</strong></div>
                <div class="cert-meta">Date: <strong>${date}</strong></div>
                <div class="cert-id">${cert.certId||cert.id}</div>
              </div>
              <div class="cert-card-footer">
                <button class="btn btn-primary btn-sm" onclick="downloadCert('${cert.id}')">
                  📄 Download PDF
                </button>
                <a href="player.html?id=${cert.courseId}" class="btn btn-secondary btn-sm">
                  Revisit Course
                </a>
              </div>
            </div>`;
        }).join("");

      } catch(err) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><h3>Could not load certificates</h3><p>${err.message}</p></div>`;
      }
    }
    // #### END LOAD CERTIFICATES ####

    // #### DOWNLOAD CERTIFICATE ####
    // Generates a PDF certificate using jsPDF (loaded from CDN)
    window.downloadCert = async function(certId) {
      const btn = event.target;
      btn.textContent = "Generating...";
      btn.disabled = true;

      try {
        // Load jsPDF from CDN
        await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
        const { jsPDF } = window.jspdf;

        // Get cert data from Firestore
        const q    = query(collection(db,"certificates"), where("certId","==",certId));
        const snap = await getDocs(q);
        if (snap.empty) { alert("Certificate not found."); return; }
        const cert = snap.docs[0].data();
        const date = cert.issuedAt?.toDate
          ? cert.issuedAt.toDate().toLocaleDateString("en-MY",{day:"numeric",month:"long",year:"numeric"})
          : new Date().toLocaleDateString("en-MY",{day:"numeric",month:"long",year:"numeric"});

        // #### GENERATE PDF CERTIFICATE ####
        const doc = new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
        const W=297, H=210;

        // Background
        doc.setFillColor(255,255,255);
        doc.rect(0,0,W,H,"F");

        // Red border
        doc.setDrawColor(215,43,43);
        doc.setLineWidth(3);
        doc.rect(10,10,W-20,H-20,"S");

        // Inner border
        doc.setLineWidth(0.5);
        doc.rect(14,14,W-28,H-28,"S");

        // Red header bar
        doc.setFillColor(215,43,43);
        doc.rect(10,10,W-20,35,"F");

        // Brand name
        doc.setTextColor(255,255,255);
        doc.setFontSize(28);
        doc.setFont("helvetica","bold");
        doc.text("iCraftCourse", W/2, 32, {align:"center"});

        // Certificate title
        doc.setTextColor(26,26,26);
        doc.setFontSize(36);
        doc.setFont("helvetica","bold");
        doc.text("CERTIFICATE OF COMPLETION", W/2, 75, {align:"center"});

        // Divider
        doc.setDrawColor(215,43,43);
        doc.setLineWidth(1);
        doc.line(50, 82, W-50, 82);

        // This is to certify
        doc.setFontSize(13);
        doc.setFont("helvetica","normal");
        doc.setTextColor(107,107,107);
        doc.text("This is to certify that", W/2, 95, {align:"center"});

        // Student name
        doc.setFontSize(32);
        doc.setFont("helvetica","bold");
        doc.setTextColor(26,26,26);
        doc.text(cert.userName||"Student", W/2, 115, {align:"center"});

        // Has completed
        doc.setFontSize(13);
        doc.setFont("helvetica","normal");
        doc.setTextColor(107,107,107);
        doc.text("has successfully completed the course:", W/2, 128, {align:"center"});

        // Course name
        doc.setFontSize(20);
        doc.setFont("helvetica","bold");
        doc.setTextColor(215,43,43);
        doc.text(cert.courseName||"Course", W/2, 143, {align:"center"});

        // Date
        doc.setFontSize(12);
        doc.setFont("helvetica","normal");
        doc.setTextColor(107,107,107);
        doc.text(`Date of Completion: ${date}`, W/2, 158, {align:"center"});

        // Divider
        doc.setDrawColor(215,43,43);
        doc.setLineWidth(0.5);
        doc.line(50, 165, W-50, 165);

        // Certificate ID
        doc.setFontSize(9);
        doc.setTextColor(150,150,150);
        doc.text(`Certificate ID: ${cert.certId||certId}`, W/2, 173, {align:"center"});

        // CPD badge
        doc.setFillColor(215,43,43);
        doc.roundedRect(W/2-25, 178, 50, 12, 3, 3, "F");
        doc.setTextColor(255,255,255);
        doc.setFontSize(9);
        doc.setFont("helvetica","bold");
        doc.text("CPD ACCREDITED", W/2, 186, {align:"center"});
        // #### END GENERATE PDF CERTIFICATE ####

        doc.save(`iCraftCourse-Certificate-${cert.certId||certId}.pdf`);

      } catch(err) {
        console.error("Certificate download error:", err);
        alert("Could not generate certificate. Please try again.");
      }

      btn.textContent = "📄 Download PDF";
      btn.disabled = false;
    };
    // #### END DOWNLOAD CERTIFICATE ####

    // #### LOAD SCRIPT HELPER ####
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement("script");
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    // #### END LOAD SCRIPT HELPER ####

    // #### LOGOUT ####
    document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth).then(()=>location.href="index.html"));
    document.getElementById("btn-logout-mobile")?.addEventListener("click",()=>signOut(auth).then(()=>location.href="index.html"));
    // #### END LOGOUT ####
  </script>
  <script src="js/nav.js"></script>
  <!-- #### END CERTIFICATES SCRIPTS #### -->
</body>
</html>
