<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <style>
    .page-header{background:var(--dark);padding:2.5rem var(--page-padding);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .page-header h1{font-family:Bebas Neue,sans-serif;font-size:2.5rem;letter-spacing:1.5px;color:white;}
    .page-header p{color:rgba(255,255,255,.5);font-size:.9rem;}
    .certs-wrap{padding:3rem var(--page-padding);max-width:1100px;margin:0 auto;}
    .certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .cert-card{background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-light);overflow:hidden;box-shadow:var(--shadow-sm);}
    .cert-card-header{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:2rem;text-align:center;}
    .cert-card-header h3{color:white;font-family:Bebas Neue,sans-serif;font-size:1.5rem;letter-spacing:1px;margin-top:.5rem;}
    .cert-card-body{padding:1.25rem;}
    .cert-course-name{font-weight:700;font-size:1rem;color:var(--dark);margin-bottom:.4rem;}
    .cert-meta{font-size:.8rem;color:var(--gray);margin-bottom:.35rem;}
    .cert-id{font-size:.72rem;color:var(--gray-mid);font-family:monospace;background:var(--off-white);padding:.25rem .5rem;border-radius:4px;display:inline-block;}
    .cert-card-footer{padding:1rem 1.25rem;border-top:1px solid var(--gray-light);display:flex;gap:.75rem;}
    .empty-state{text-align:center;padding:4rem;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-light);}
    @media(max-width:768px){.certs-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span class="nav-logo-badge">eD</span>edu-my.web</a>
    <div class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="courses.html" class="nav-link">Courses</a><a href="dashboard.html" class="nav-link active">Dashboard</a></div>
    <div class="nav-actions" id="nav-guest">

      <div class="nav-dropdown">
        <div class="nav-dropdown-header">
          <div class="nav-dropdown-name" id="dd-name">User</div>
          <div class="nav-dropdown-email" id="dd-email"></div>

        <a href="dashboard.html" class="nav-dropdown-item"><span class="item-icon">&#128202;</span> My Dashboard</a>

      </div>

  </nav>
  <div class="nav-mobile-drawer" id="nav-mobile-drawer">
    <a href="index.html" class="nav-link">Home</a>
    <a href="courses.html" class="nav-link">Courses</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <div class="nav-actions" id="nav-mobile-guest">
      <a href="login.html" class="btn btn-secondary">Log In</a>
      <a href="register.html" class="btn btn-primary">Get Started</a>

    <div class="hidden" id="nav-mobile-user">
      <a href="dashboard.html" class="nav-link">My Dashboard</a>

  <div class="page-header">
    <div><h1>MY CERTIFICATES</h1><p>Your earned CPD certificates.</p></div>
    <a href="courses.html" class="btn btn-primary">Earn More</a>
  </div>
  <div class="certs-wrap">
    <div class="certs-grid" id="certs-grid">
      <div class="loading-text" style="grid-column:1/-1;padding:2rem;justify-content:center;"><div class="spinner spinner-sm"></div>&nbsp;Loading...</div>
    </div>
  </div>
  <script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {getFirestore,collection,query,where,getDocs,doc,getDoc} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const app=initializeApp({
      apiKey:"AIzaSyCpXYFftiB-agrY44eGKdFyUPm-t7FXbUk",
      authDomain:"kolamdata.firebaseapp.com",
      projectId:"kolamdata",
      storageBucket:"kolamdata.firebasestorage.app",
      messagingSenderId:"16403132310",
      appId:"1:16403132310:web:464c4ad2d19812f95077b7"
    }); const auth=getAuth(app); const db=getFirestore(app);
    
    // #### waitForAuth — resolves once Firebase confirms auth state ####
    function waitForAuth() {
      return new Promise((resolve) => {
        const unsub = onAuthStateChanged(auth, (user) => { unsub(); resolve(user); });
      });
    }
    waitForAuth().then(async(user)=>{
      if(!user){ location.href="login.html"; return; }
      const g=document.getElementById("nav-guest"),u=document.getElementById("nav-user");
      const mg=document.getElementById("nav-mobile-guest"),mu=document.getElementById("nav-mobile-user");
      if(user){
        g?.classList.add("hidden");u?.classList.remove("hidden");
        mg?.classList.add("hidden");mu?.classList.remove("hidden");
        const n=user.displayName||"User",el=id=>document.getElementById(id);
        if(el("nav-avatar"))el("nav-avatar").textContent=n.charAt(0).toUpperCase();
        if(el("nav-name"))el("nav-name").textContent=n;
        if(el("dd-name"))el("dd-name").textContent=n;
        if(el("dd-email"))el("dd-email").textContent=user.email||"";
        window.cacheAuthUser?.(user, false);
      }else{
        g?.classList.remove("hidden");u?.classList.add("hidden");
        mg?.classList.remove("hidden");mu?.classList.add("hidden");
      }
      await loadCerts(user);
    });
    document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth).then(()=>{window.clearAuthCache?.();location.href="index.html";}));
    document.getElementById("btn-logout-mobile")?.addEventListener("click",()=>signOut(auth).then(()=>{window.clearAuthCache?.();location.href="index.html";}));
    async function loadCerts(user){
      const grid=document.getElementById("certs-grid");
      try{
        const snap=await getDocs(query(collection(db,"certificates"),where("userId","==",user.uid)));
        const certs=[];snap.forEach(d=>certs.push({id:d.id,...d.data()}));
        if(!certs.length){
          grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div style="font-size:3rem">&#127942;</div><h3 style="margin:.75rem 0 .5rem">No certificates yet</h3><p style="margin-bottom:1.25rem">Complete a course to earn your first CPD certificate!</p><a href="courses.html" class="btn btn-primary">Browse Courses</a></div>';
          return;
        }
        grid.innerHTML=certs.map(c=>{
          const date=c.issuedAt?.toDate?c.issuedAt.toDate().toLocaleDateString("en-MY",{day:"numeric",month:"long",year:"numeric"}):"&#8212;";
          return '<div class="cert-card">'
            +'<div class="cert-card-header"><div style="font-size:2.5rem">&#127942;</div><h3>Certificate of<br/>Completion</h3></div>'
            +'<div class="cert-card-body">'
            +'<div class="cert-course-name">'+(c.courseName||"Course")+'</div>'
            +'<div class="cert-meta">Issued to: <strong>'+(c.userName||"Student")+'</strong></div>'
            +'<div class="cert-meta">Date: <strong>'+date+'</strong></div>'
            +'<div class="cert-id">'+(c.certId||c.id)+'</div></div>'
            +'<div class="cert-card-footer">'
            +'<button class="btn btn-primary btn-sm" onclick="downloadCert(\''+c.id+'\',\''+( c.certId||c.id)+'\',\''+encodeURIComponent(c.userName||"")+'\',\''+encodeURIComponent(c.courseName||"")+'\',\''+date+'\',\''+encodeURIComponent(c.courseId||"")+'\')">&#x1F4C4; Download PDF</button>'
            +'<a href="player.html?id='+(c.courseId||"")+'" class="btn btn-secondary btn-sm">Revisit</a>'
            +'</div></div>';
        }).join("");
      }catch(e){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><p>Error: '+e.message+'</p></div>';}
    }
    window.downloadCert=async function(certId,certCode,nameEnc,courseEnc,date,courseIdEnc){
      const btn=event.target;btn.textContent="Generating...";btn.disabled=true;
      try{
        await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
        const {jsPDF}=window.jspdf;
        const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
        const W=297,H=210,name=decodeURIComponent(nameEnc),course=decodeURIComponent(courseEnc);
        // Fetch credit hours from course
        let creditHours="";
        try{
          const cid=decodeURIComponent(courseIdEnc||"");
          if(cid){const cs=await getDoc(doc(db,"courses",cid));if(cs.exists())creditHours=cs.data().totalDuration||"";}
        }catch(e){}
        doc.setFillColor(255,255,255);doc.rect(0,0,W,H,"F");
        doc.setDrawColor(215,43,43);doc.setLineWidth(3);doc.rect(10,10,W-20,H-20,"S");
        doc.setLineWidth(.5);doc.rect(14,14,W-28,H-28,"S");
        doc.setFillColor(215,43,43);doc.rect(10,10,W-20,35,"F");
        doc.setTextColor(255,255,255);doc.setFontSize(26);doc.setFont("helvetica","bold");
        doc.text("edu-my.web",W/2,30,{align:"center"});
        doc.setTextColor(26,26,26);doc.setFontSize(34);
        doc.text("CERTIFICATE OF COMPLETION",W/2,72,{align:"center"});
        doc.setDrawColor(215,43,43);doc.setLineWidth(1);doc.line(50,79,W-50,79);
        doc.setFontSize(12);doc.setFont("helvetica","normal");doc.setTextColor(107,107,107);
        doc.text("This is to certify that",W/2,92,{align:"center"});
        doc.setFontSize(30);doc.setFont("helvetica","bold");doc.setTextColor(26,26,26);
        doc.text(name,W/2,110,{align:"center"});
        doc.setFontSize(12);doc.setFont("helvetica","normal");doc.setTextColor(107,107,107);
        doc.text("has successfully completed the course:",W/2,123,{align:"center"});
        doc.setFontSize(18);doc.setFont("helvetica","bold");doc.setTextColor(215,43,43);
        doc.text(course,W/2,138,{align:"center"});
        doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(107,107,107);
        doc.text("Date of Completion: "+date,W/2,152,{align:"center"});
        doc.setDrawColor(215,43,43);doc.setLineWidth(.5);doc.line(50,159,W-50,159);
        doc.setFontSize(8);doc.setTextColor(150,150,150);
        doc.text("Certificate ID: "+certCode,W/2,167,{align:"center"});
        doc.setFillColor(215,43,43);doc.roundedRect(W/2-25,172,50,11,3,3,"F");
        doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");
        doc.text("CPD ACCREDITED",W/2,179,{align:"center"});

        // Credit hours line
        doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(26,26,26);
        if(creditHours){doc.text("Total Credit Hours: "+creditHours,W/2,194,{align:"center"});}

        // Digital issue note (no signature needed)
        doc.setFontSize(8);doc.setTextColor(150,150,150);
        doc.text("This certificate was digitally issued by edu-my.web. Verify at: edu-my.github.io/course",W/2,205,{align:"center"});

        doc.save("edu-my.web-Certificate-"+certCode+".pdf");
      }catch(e){alert("Could not generate PDF: "+e.message);}
      btn.textContent="&#x1F4C4; Download PDF";btn.disabled=false;
    };
  </script>
  <script src="js/nav.js"></script>
