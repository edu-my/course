<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <script src="js/theme.js"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Courses — edu-my.web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <style>
    *{box-sizing:border-box;}
    body{background:#f7f7f7;color:#1a1a1a;font-family:'DM Sans',sans-serif;}
    #nav-guest,#nav-user{min-width:170px;justify-content:flex-end;}
    #nav-guest.hidden,#nav-user.hidden{display:none!important;}

    /* PAGE HEADER — matches dashboard compact style */
    .page-header{background:#1A1A1A;padding:1.25rem var(--page-padding);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1.5px;color:#fff;line-height:1;margin:0;}
    .page-header p{color:rgba(255,255,255,.4);font-size:.78rem;margin:.2rem 0 0;}
    .page-header-count{padding:.55rem 1.25rem;background:#D72B2B;color:#fff;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;white-space:nowrap;}

    /* FILTER BAR */
    .filter-bar{background:#fff;border-bottom:1px solid #efefef;padding:.85rem var(--page-padding);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:var(--nav-height);z-index:100;}
    .filter-pills{display:flex;gap:.5rem;flex-wrap:wrap;flex:1;}
    .filter-pill{padding:.4rem 1rem;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;color:#888;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
    .filter-pill:hover{border-color:#D72B2B;color:#D72B2B;}
    .filter-pill.active{border-color:#D72B2B;background:#D72B2B;color:#fff;}
    .search-wrap{position:relative;}
    .search-input{padding:.42rem 1rem .42rem 2.25rem;border:1.5px solid #e0e0e0;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;width:220px;transition:border-color .15s;}
    .search-input:focus{border-color:#D72B2B;}
    .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.82rem;color:#bbb;pointer-events:none;}

    /* RESULTS BAR */
    .results-bar{padding:1rem var(--page-padding) 0;font-size:.82rem;color:#aaa;}
    .results-bar strong{color:#1a1a1a;}

    /* COURSE GRID */
    .courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;padding:1.25rem var(--page-padding) 4rem;}
    .course-card{background:#fff;border-radius:12px;border:1px solid #efefef;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;}
    .course-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(215,43,43,.1);}
    .course-thumb{height:150px;display:flex;align-items:center;justify-content:center;position:relative;font-size:3rem;flex-shrink:0;}
    .thumb-ai{background:#FFEAEA;}
    .thumb-soft{background:#EAF0FF;}
    .thumb-personal{background:#EAFFF2;}
    .thumb-education{background:#FFF8EA;}
    .thumb-default{background:#F5F0FF;}
    .course-badge{position:absolute;top:12px;left:12px;padding:.22rem .65rem;border-radius:12px;font-size:.68rem;font-weight:700;}
    .badge-free{background:#EAFFF2;color:#1E8A4C;}
    .badge-paid{background:#FFEAEA;color:#D72B2B;}
    .course-body{padding:1.15rem;display:flex;flex-direction:column;flex:1;}
    .course-cat{font-size:.65rem;color:#D72B2B;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.35rem;}
    .course-title{font-size:.95rem;font-weight:700;color:#1a1a1a;margin-bottom:.35rem;line-height:1.4;}
    .course-desc{font-size:.78rem;color:#999;line-height:1.55;margin-bottom:.9rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
    .course-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f5f5f5;padding-top:.85rem;margin-top:auto;}
    .course-price{font-weight:800;font-size:1rem;color:#1a1a1a;}
    .course-price.free{color:#1E8A4C;}
    .course-btn{border:none;padding:6px 14px;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;min-width:100px;text-align:center;transition:all .15s;}
    .course-btn.red{background:#D72B2B;color:#fff;}
    .course-btn.red:hover{background:#A81F1F;}
    .course-btn.green{background:#1E8A4C;color:#fff;}
    .course-btn.green:hover{background:#155f35;}
    .course-btn.ghost{background:#fff;color:#D72B2B;border:1.5px solid #D72B2B;}
    .course-btn.ghost:hover{background:#D72B2B;color:#fff;}
    .course-btn.amber{background:#F59E0B;color:#fff;}
    .empty-state{grid-column:1/-1;text-align:center;padding:4rem;color:#aaa;font-size:.9rem;}

    @media(max-width:1024px){.courses-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:640px){.courses-grid{grid-template-columns:1fr;}.search-input{width:100%;}.filter-bar{flex-direction:column;align-items:stretch;}}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">edu-my.web</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="courses.html" class="nav-link active">Courses</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
  </div>
  <div class="nav-actions" id="nav-guest">
    <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
    <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
  </div>
  <div class="nav-user hidden" id="nav-user">
    <div class="nav-avatar" id="nav-avatar">U</div>
    <div class="nav-user-name" id="nav-name">User</div>
    <div class="nav-dropdown">
      <div class="nav-dropdown-header">
        <div class="nav-dropdown-name" id="dd-name">User</div>
        <div class="nav-dropdown-email" id="dd-email"></div>
      </div>
      <a href="dashboard.html" class="nav-dropdown-item"><span class="item-icon">📊</span> My Dashboard</a>
      <a href="certificates.html" class="nav-dropdown-item"><span class="item-icon">🏆</span> My Certificates</a>

      <button class="nav-dropdown-item danger" id="btn-logout"><span class="item-icon">🚪</span> Log Out</button>
    </div>
  </div>
  <button class="nav-hamburger" id="nav-hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="nav-mobile-drawer" id="nav-mobile-drawer">
  <a href="index.html" class="nav-link">Home</a>
  <a href="courses.html" class="nav-link active">Courses</a>
  <a href="dashboard.html" class="nav-link">Dashboard</a>
  <div class="nav-actions" id="nav-mobile-guest">
    <a href="login.html" class="btn btn-secondary">Log In</a>
    <a href="register.html" class="btn btn-primary">Get Started</a>
  </div>
  <div class="hidden" id="nav-mobile-user">
    <a href="dashboard.html" class="nav-link">My Dashboard</a>
    <button class="btn btn-secondary" id="btn-logout-mobile">Log Out</button>
  </div>
</div>

<div class="page-header">
  <div>
    <h1>ALL COURSES</h1>
    <p>Free and paid courses available</p>
  </div>
  <span class="page-header-count" id="header-count">Loading...</span>
</div>

<div class="filter-bar">
  <div class="filter-pills">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="free">🆓 Free</button>
    <button class="filter-pill" data-filter="paid">💳 Paid</button>
    <button class="filter-pill" data-filter="AI">🤖 AI</button>
    <button class="filter-pill" data-filter="Soft Skills">💬 Soft Skills</button>
    <button class="filter-pill" data-filter="Personal Development">🌱 Personal Dev</button>
    <button class="filter-pill" data-filter="Education">📚 Education</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search courses..."/>
  </div>
</div>

<div class="results-bar" id="results-bar">Loading...</div>
<div class="courses-grid" id="courses-grid">
  <div class="empty-state">Loading courses...</div>
</div>

<div class="help-float">
  <span class="help-text" id="help-text">Let me know how I can help</span>
  <a class="help-wa" href="https://wa.me/60108402462" target="_blank">

  </a>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {getFirestore,collection,getDocs,query,where,doc,getDoc} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyCpXYFftiB-agrY44eGKdFyUPm-t7FXbUk",authDomain:"kolamdata.firebaseapp.com",projectId:"kolamdata",storageBucket:"kolamdata.firebasestorage.app",messagingSenderId:"16403132310",appId:"1:16403132310:web:464c4ad2d19812f95077b7"});
const auth=getAuth(app),db=getFirestore(app);
const bgMap={"AI":"thumb-ai","Soft Skills":"thumb-soft","Personal Development":"thumb-personal","Education":"thumb-education"};
let allCourses=[],activeFilter="all",searchTerm="",currentUser=null,userStatus={},isAdmin=false;

// AUTH
onAuthStateChanged(auth,async(user)=>{
  currentUser=user;
  const g=document.getElementById("nav-guest"),u=document.getElementById("nav-user");
  const mg=document.getElementById("nav-mobile-guest"),mu=document.getElementById("nav-mobile-user");
  if(user){
    g?.classList.add("hidden");u?.classList.remove("hidden");
    mg?.classList.add("hidden");mu?.classList.remove("hidden");
    const n=user.displayName||"User",el=id=>document.getElementById(id);
    if(el("nav-avatar"))el("nav-avatar").textContent=n.charAt(0).toUpperCase();
    if(el("nav-name"))el("nav-name").textContent=n;
    if(el("dd-name"))el("dd-name").textContent=n;
    if(el("dd-email"))el("dd-email").textContent=user.email||"";
    try{
      const ud=await getDoc(doc(db,"users",user.uid));
      const ia=ud.exists()&&ud.data().role==="admin";
      isAdmin=ia;
      window.cacheAuthUser?.(user,ia);
      if(ia)window.setAdminNav?.(true);
    }catch(e){window.cacheAuthUser?.(user,false);}
    try{
      const [es,ps]=await Promise.all([
        getDocs(query(collection(db,"enrollments"),where("userId","==",user.uid))),
        getDocs(query(collection(db,"payments"),where("userId","==",user.uid)))
      ]);
      userStatus={};
      es.forEach(d=>{userStatus[d.data().courseId]="enrolled";});
      ps.forEach(d=>{const p=d.data();if(!userStatus[p.courseId])userStatus[p.courseId]=p.status;});
    }catch(e){}
  }else{
    g?.classList.remove("hidden");u?.classList.add("hidden");
    mg?.classList.remove("hidden");mu?.classList.add("hidden");
    userStatus={};
  }
  renderCourses();
});
document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth).then(()=>{window.clearAuthCache?.();location.href="index.html";}));
document.getElementById("btn-logout-mobile")?.addEventListener("click",()=>signOut(auth).then(()=>{window.clearAuthCache?.();location.href="index.html";}));

// COURSES
async function loadCourses(){
  try{
    const snap=await getDocs(query(collection(db,"courses"),where("isPublished","==",true)));
    allCourses=[];
    snap.forEach(d=>allCourses.push({id:d.id,...d.data()}));
    const hc=document.getElementById("header-count");
    if(hc)hc.textContent=allCourses.length+" course"+(allCourses.length!==1?"s":"");
    renderCourses();
  }catch(e){
    document.getElementById("courses-grid").innerHTML='<div class="empty-state">Could not load courses: '+e.message+'</div>';
  }
}

function getCourseBtn(c){
  const isFree=c.isFree===true,st=userStatus[c.id];
  if(isAdmin)     return {cls:"ghost",  label:"View Course", href:"player.html?id="+c.id};
  if(st==="enrolled") return {cls:"green", label:"▶ Continue",   href:"player.html?id="+c.id};
  if(st==="approved") return {cls:"green", label:"✓ Start Now",  href:"player.html?id="+c.id};
  if(st==="pending")  return {cls:"amber", label:"⏳ Pending",    href:"payment.html?course="+c.id};
  if(isFree)          return {cls:"green", label:"Start Free",    href:"course.html?id="+c.id};
  return                     {cls:"red",   label:"Enroll Now",   href:"course.html?id="+c.id};
}

function renderCourses(){
  const grid=document.getElementById("courses-grid"),bar=document.getElementById("results-bar");
  const filtered=allCourses.filter(c=>{
    const mf=activeFilter==="all"
      ||(activeFilter==="free"&&c.isFree===true)
      ||(activeFilter==="paid"&&c.isFree!==true)
      ||c.category===activeFilter;
    const ms=!searchTerm||c.title.toLowerCase().includes(searchTerm)||(c.description||"").toLowerCase().includes(searchTerm);
    return mf&&ms;
  });
  bar.innerHTML="Showing <strong>"+filtered.length+"</strong> of <strong>"+allCourses.length+"</strong> courses";
  if(!filtered.length){grid.innerHTML='<div class="empty-state">🔍 No courses found.</div>';return;}
  grid.innerHTML=filtered.map(c=>{
    const isFree=c.isFree===true,price=isFree?"FREE":"RM "+parseFloat(c.price||0).toFixed(2);
    const bg=bgMap[c.category]||"thumb-default",btn=getCourseBtn(c);
    const emoji=c.thumbnailEmoji||"📚";
    return `<div class="course-card" onclick="location.href='${btn.href}'">
      <div class="course-thumb ${bg}">${emoji}<span class="course-badge ${isFree?'badge-free':'badge-paid'}">${price}</span></div>
      <div class="course-body">
        <div class="course-cat">${c.category||"General"}</div>
        <div class="course-title">${c.title}</div>
        <div class="course-desc">${c.description||""}</div>
        <div class="course-footer">
          <div class="course-price ${isFree?"free":""}">${price}</div>
          <button class="course-btn ${btn.cls}" onclick="event.stopPropagation();location.href='${btn.href}'">${btn.label}</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// FILTERS + SEARCH
document.querySelectorAll(".filter-pill").forEach(p=>p.addEventListener("click",()=>{
  document.querySelectorAll(".filter-pill").forEach(x=>x.classList.remove("active"));
  p.classList.add("active");
  activeFilter=p.dataset.filter;
  renderCourses();
}));
document.getElementById("search-input").addEventListener("input",e=>{
  searchTerm=e.target.value.toLowerCase().trim();
  renderCourses();
});

// URL PARAMS — ?filter=free or ?cat=AI
const params=new URLSearchParams(location.search);
if(params.get("filter")==="free"){
  activeFilter="free";
  document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter==="free"));
}
if(params.get("cat")){
  activeFilter=params.get("cat");
  document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter===activeFilter));
}

loadCourses();
setTimeout(()=>{const t=document.getElementById("help-text");if(t)t.classList.add("visible");},4000);
</script>
<script src="js/nav.js"></script>
</body>
</html>
