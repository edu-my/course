<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Courses — iCraftCourse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <style>
    .page-header{background:var(--dark);padding:3rem var(--page-padding);text-align:center;}
    .page-header h1{font-family:Bebas Neue,sans-serif;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:2px;color:var(--white);margin-bottom:.5rem;}
    .page-header p{color:rgba(255,255,255,.5);font-size:.95rem;}
    .filter-bar{background:var(--white);border-bottom:1px solid var(--gray-light);padding:1rem var(--page-padding);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:var(--nav-height);z-index:100;box-shadow:var(--shadow-sm);}
    .filter-pills{display:flex;gap:.5rem;flex-wrap:wrap;flex:1;}
    .filter-pill{padding:.4rem 1rem;border-radius:20px;border:2px solid var(--gray-light);background:var(--white);color:var(--gray);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:DM Sans,sans-serif;}
    .filter-pill:hover{border-color:var(--red);color:var(--red);}
    .filter-pill.active{border-color:var(--red);background:var(--red);color:var(--white);}
    .search-input{padding:.45rem 1rem;border:2px solid var(--gray-light);border-radius:20px;font-family:DM Sans,sans-serif;font-size:.85rem;outline:none;width:220px;}
    .search-input:focus{border-color:var(--red);}
    .results-bar{padding:1.25rem var(--page-padding) 0;font-size:.85rem;color:var(--gray);}
    .courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;padding:1.5rem var(--page-padding) 4rem;}
    .course-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-light);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;}
    .course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-red);}
    .course-thumb{height:160px;display:flex;align-items:center;justify-content:center;position:relative;font-size:3.5rem;}
    .thumb-ai{background:linear-gradient(135deg,#FFEAEA,#FFD0D0);}
    .thumb-soft{background:linear-gradient(135deg,#EAF0FF,#D0DEFF);}
    .thumb-personal{background:linear-gradient(135deg,#EAFFF2,#C8F5D8);}
    .thumb-education{background:linear-gradient(135deg,#FFF8EA,#FFE9B0);}
    .thumb-default{background:linear-gradient(135deg,#F0EDFF,#DDD5FF);}
    .course-badge{position:absolute;top:12px;left:12px;}
    .course-body{padding:1.25rem;}
    .course-cat{font-size:.72rem;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem;}
    .course-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:.4rem;line-height:1.4;}
    .course-desc{font-size:.82rem;color:var(--gray);line-height:1.5;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .course-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--gray-light);padding-top:.85rem;}
    .course-price{font-weight:700;font-size:1.1rem;color:var(--dark);}
    .course-price.free{color:var(--green);}
    .empty-state{grid-column:1/-1;text-align:center;padding:4rem;color:var(--gray);}
    @media(max-width:1024px){.courses-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:640px){.courses-grid{grid-template-columns:1fr;}.search-input{width:100%;}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">iCraft<span>Course</span></a>
    <div class="nav-links"><a href="index.html" class="nav-link">Home</a><a href="courses.html" class="nav-link active">Courses</a><a href="dashboard.html" class="nav-link">Dashboard</a></div>
    <div class="nav-actions" id="nav-guest">
      <a href="login.html" class="btn btn-secondary btn-sm">Log In</a>
      <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="nav-avatar" id="nav-avatar">U</div>
      <div class="nav-user-name" id="nav-name">User</div>
      <div class="nav-dropdown">
        <div class="nav-dropdown-header">
          <div class="nav-dropdown-name" id="dd-name">User</div>
          <div class="nav-dropdown-email" id="dd-email"></div>
        </div>
        <a href="dashboard.html" class="nav-dropdown-item"><span class="item-icon">&#128202;</span> My Dashboard</a>
        <a href="certificates.html" class="nav-dropdown-item"><span class="item-icon">&#127942;</span> My Certificates</a>
        <a href="profile.html" class="nav-dropdown-item"><span class="item-icon">&#128100;</span> My Profile</a>
        <button class="nav-dropdown-item danger" id="btn-logout"><span class="item-icon">&#128682;</span> Log Out</button>
      </div>
    </div>
    <button class="nav-hamburger" id="nav-hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-mobile-drawer" id="nav-mobile-drawer">
    <a href="index.html" class="nav-link">Home</a>
    <a href="courses.html" class="nav-link">Courses</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <div class="nav-actions" id="nav-mobile-guest">
      <a href="login.html" class="btn btn-secondary">Log In</a>
      <a href="register.html" class="btn btn-primary">Get Started</a>
    </div>
    <div class="hidden" id="nav-mobile-user">
      <a href="dashboard.html" class="nav-link">My Dashboard</a>
      <button class="btn btn-secondary" id="btn-logout-mobile">Log Out</button>
    </div>
  </div>
  <div class="page-header"><h1>ALL COURSES</h1><p>Free and paid courses available</p></div>
  <div class="filter-bar">
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="free">&#x1F193; Free</button>
      <button class="filter-pill" data-filter="paid">&#x1F4B3; Paid</button>
      <button class="filter-pill" data-filter="AI">&#x1F916; AI</button>
      <button class="filter-pill" data-filter="Soft Skills">&#x1F4AC; Soft Skills</button>
      <button class="filter-pill" data-filter="Personal Development">&#x1F331; Personal Dev</button>
      <button class="filter-pill" data-filter="Education">&#x1F4DA; Education</button>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="&#x1F50D; Search courses..."/>
  </div>
  <div class="results-bar" id="results-bar">Loading...</div>
  <div class="courses-grid" id="courses-grid"><div class="loading-text" style="grid-column:1/-1;padding:4rem;justify-content:center;"><div class="spinner"></div>&nbsp;Loading courses...</div></div>
  <script type="module">
    import {initializeApp} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {getFirestore,collection,getDocs,query,where} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const app=initializeApp({
      apiKey:"AIzaSyCpXYFftiB-agrY44eGKdFyUPm-t7FXbUk",
      authDomain:"kolamdata.firebaseapp.com",
      projectId:"kolamdata",
      storageBucket:"kolamdata.firebasestorage.app",
      messagingSenderId:"16403132310",
      appId:"1:16403132310:web:464c4ad2d19812f95077b7"
    }); const auth=getAuth(app); const db=getFirestore(app);
    const bgMap={"AI":"thumb-ai","Soft Skills":"thumb-soft","Personal Development":"thumb-personal","Education":"thumb-education"};
    let allCourses=[],activeFilter="all",searchTerm="";
    onAuthStateChanged(auth,(user)=>{ const g=document.getElementById("nav-guest"),u=document.getElementById("nav-user");
      const mg=document.getElementById("nav-mobile-guest"),mu=document.getElementById("nav-mobile-user");
      if(user){
        g?.classList.add("hidden");u?.classList.remove("hidden");
        mg?.classList.add("hidden");mu?.classList.remove("hidden");
        const n=user.displayName||"User",el=id=>document.getElementById(id);
        if(el("nav-avatar"))el("nav-avatar").textContent=n.charAt(0).toUpperCase();
        if(el("nav-name"))el("nav-name").textContent=n;
        if(el("dd-name"))el("dd-name").textContent=n;
        if(el("dd-email"))el("dd-email").textContent=user.email||"";
      }else{
        g?.classList.remove("hidden");u?.classList.add("hidden");
        mg?.classList.remove("hidden");mu?.classList.add("hidden");
      } });
    document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth).then(()=>location.href="index.html"));
    document.getElementById("btn-logout-mobile")?.addEventListener("click",()=>signOut(auth).then(()=>location.href="index.html"));
    async function loadCourses(){
      try{
        const snap=await getDocs(query(collection(db,"courses"),where("isPublished","==",true)));
        allCourses=[];snap.forEach(d=>allCourses.push({id:d.id,...d.data()}));
        renderCourses();
      }catch(e){document.getElementById("courses-grid").innerHTML='<div class="empty-state">Could not load: '+e.message+'</div>';}
    }
    function renderCourses(){
      const grid=document.getElementById("courses-grid"),bar=document.getElementById("results-bar");
      const filtered=allCourses.filter(c=>{
        const mf=activeFilter==="all"||activeFilter==="free"&&c.isFree===true||activeFilter==="paid"&&c.isFree!==true||c.category===activeFilter;
        const ms=!searchTerm||c.title.toLowerCase().includes(searchTerm)||(c.description||"").toLowerCase().includes(searchTerm);
        return mf&&ms;
      });
      bar.innerHTML="Showing <strong>"+filtered.length+"</strong> of <strong>"+allCourses.length+"</strong> courses";
      if(!filtered.length){grid.innerHTML='<div class="empty-state">&#x1F50D; No courses found. Try a different filter.</div>';return;}
      grid.innerHTML=filtered.map(c=>{
        const isFree=c.isFree===true,price=isFree?"FREE":"RM "+parseFloat(c.price||0).toFixed(2);
        const bg=bgMap[c.category]||"thumb-default";
        return '<div class="course-card" onclick="location.href=\'course.html?id='+c.id+'\'">'
          +'<div class="course-thumb '+bg+'">'+(c.thumbnailEmoji||"&#x1F4DA;")+'<span class="course-badge badge '+(isFree?"badge-free":"badge-paid")+'">'+price+'</span></div>'
          +'<div class="course-body"><div class="course-cat">'+(c.category||"General")+'</div>'
          +'<div class="course-title">'+c.title+'</div>'
          +'<div class="course-desc">'+(c.description||"")+'</div>'
          +'<div class="course-footer"><div class="course-price '+(isFree?"free":"")+'">'+price+'</div>'
          +'<button class="btn '+(isFree?"btn-success":"btn-primary")+' btn-sm" onclick="event.stopPropagation();location.href=\'course.html?id='+c.id+'\'">'+( isFree?"Start Free":"Enroll Now")+'</button>'
          +'</div></div></div>';
      }).join("");
    }
    document.querySelectorAll(".filter-pill").forEach(p=>p.addEventListener("click",()=>{
      document.querySelectorAll(".filter-pill").forEach(x=>x.classList.remove("active"));
      p.classList.add("active"); activeFilter=p.dataset.filter; renderCourses();
    }));
    document.getElementById("search-input").addEventListener("input",e=>{searchTerm=e.target.value.toLowerCase().trim();renderCourses();});
    const params=new URLSearchParams(location.search);
    if(params.get("filter")==="free"){activeFilter="free";document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter==="free"));}
    if(params.get("cat")){activeFilter=params.get("cat");document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter===activeFilter));}
    loadCourses();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
