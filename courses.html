<head>
  <!-- #### HEAD META #### -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- #### END HEAD META #### -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/nav.css"/>
  <!-- #### PAGE STYLES #### -->
  <style>
    .page-header{background:var(--dark);padding:3rem var(--page-padding);text-align:center;}
    .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:2px;color:var(--white);margin-bottom:0.5rem;}
    .page-header p{color:rgba(255,255,255,0.5);font-size:0.95rem;}
    .filter-bar{background:var(--white);border-bottom:1px solid var(--gray-light);padding:1rem var(--page-padding);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:var(--nav-height);z-index:100;box-shadow:var(--shadow-sm);}
    .filter-label{font-size:0.8rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
    .filter-pills{display:flex;gap:0.5rem;flex-wrap:wrap;flex:1;}
    .filter-pill{padding:0.4rem 1rem;border-radius:20px;border:2px solid var(--gray-light);background:var(--white);color:var(--gray);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .filter-pill:hover{border-color:var(--red);color:var(--red);}
    .filter-pill.active{border-color:var(--red);background:var(--red);color:var(--white);}
    .search-wrap{display:flex;align-items:center;gap:0.5rem;margin-left:auto;}
    .search-input{padding:0.45rem 1rem;border:2px solid var(--gray-light);border-radius:20px;font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;width:220px;transition:border-color 0.2s;}
    .search-input:focus{border-color:var(--red);}
    .results-bar{padding:1.25rem var(--page-padding) 0;display:flex;align-items:center;justify-content:space-between;}
    .results-count{font-size:0.85rem;color:var(--gray);}
    .results-count strong{color:var(--dark);}
    .courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;padding:1.5rem var(--page-padding) 4rem;}
    .course-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-light);overflow:hidden;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s;box-shadow:var(--shadow-sm);}
    .course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-red);}
    .course-thumb{height:160px;display:flex;align-items:center;justify-content:center;position:relative;}
    .thumb-emoji{font-size:3.5rem;}
    .thumb-ai{background:linear-gradient(135deg,#FFEAEA,#FFD0D0);}
    .thumb-soft{background:linear-gradient(135deg,#EAF0FF,#D0DEFF);}
    .thumb-personal{background:linear-gradient(135deg,#EAFFF2,#C8F5D8);}
    .thumb-education{background:linear-gradient(135deg,#FFF8EA,#FFE9B0);}
    .thumb-default{background:linear-gradient(135deg,#F0EDFF,#DDD5FF);}
    .course-badge{position:absolute;top:12px;left:12px;}
    .course-body{padding:1.25rem;}
    .course-category{font-size:0.72rem;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.4rem;}
    .course-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:0.4rem;line-height:1.4;}
    .course-desc{font-size:0.82rem;color:var(--gray);line-height:1.5;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .course-meta{display:flex;gap:0.75rem;font-size:0.75rem;color:var(--gray);margin-bottom:1rem;flex-wrap:wrap;}
    .course-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--gray-light);padding-top:0.85rem;}
    .course-price{font-weight:700;font-size:1.1rem;color:var(--dark);}
    .course-price.free{color:var(--green);}
    .empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--gray);}
    .empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;}
    .empty-state h3{font-size:1.2rem;margin-bottom:0.5rem;color:var(--dark);}
    .loading-state{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:1rem;padding:4rem;color:var(--gray);}
    @media(max-width:1024px){.courses-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:640px){.courses-grid{grid-template-columns:1fr;}.search-wrap{width:100%;}.search-input{width:100%;}}
  </style>
  <!-- #### END PAGE STYLES #### -->
</head>
<body>

  <!-- #### NAVBAR #### -->
  <nav class="navbar">
    <a href="index.html"   class="nav-logo">iCraft<span>Course</span></a>
    <div class="nav-links">
      <a href="index.html"   class="nav-link">Home</a>
      <a href="courses.html" class="nav-link active">Courses</a>
      <a href="about.html"   class="nav-link">About</a>
    </div>
    <div class="nav-actions" id="nav-guest">
      <a href="login.html"    class="btn btn-secondary btn-sm">Log In</a>
      <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="nav-avatar" id="nav-avatar-initials">U</div>
      <div class="nav-user-name" id="nav-user-name">User</div>
      <div class="nav-dropdown">
        <div class="nav-dropdown-header">
          <div class="nav-dropdown-name"  id="dropdown-name">User</div>
          <div class="nav-dropdown-email" id="dropdown-email">user@email.com</div>
        </div>
        <a href="dashboard.html"    class="nav-dropdown-item"><span class="item-icon">📊</span> My Dashboard</a>

  </nav>
  <!-- #### END NAVBAR #### -->

  <!-- #### MOBILE DRAWER #### -->
  <div class="nav-mobile-drawer" id="nav-mobile-drawer">
    <a href="index.html"   class="nav-link">Home</a>
    <a href="courses.html" class="nav-link active">Courses</a>
    <div class="nav-actions" id="nav-mobile-guest">
      <a href="login.html"    class="btn btn-secondary">Log In</a>
      <a href="register.html" class="btn btn-primary">Get Started</a>
    </div>
    <div class="hidden" id="nav-mobile-user">
      <a href="dashboard.html" class="nav-link">📊 My Dashboard</a>
      <button class="btn btn-secondary" id="btn-logout-mobile">🚪 Log Out</button>
    </div>
  </div>
  <!-- #### END MOBILE DRAWER #### -->

  <!-- #### PAGE HEADER #### -->
  <div class="page-header">
    <h1>ALL COURSES</h1>
    <p>Choose your learning path — free and paid courses available</p>
  </div>
  <!-- #### END PAGE HEADER #### -->

  <!-- #### FILTER BAR #### -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="all">All Courses</button>
      <button class="filter-pill" data-filter="free">🆓 Free</button>
      <button class="filter-pill" data-filter="paid">💳 Paid</button>
      <button class="filter-pill" data-filter="AI">🤖 AI</button>
      <button class="filter-pill" data-filter="Soft Skills">💬 Soft Skills</button>
      <button class="filter-pill" data-filter="Personal Development">🌱 Personal Dev</button>
      <button class="filter-pill" data-filter="Education">📚 Education</button>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 Search courses..."/>
    </div>
  </div>
  <!-- #### END FILTER BAR #### -->

  <!-- #### RESULTS BAR #### -->
  <div class="results-bar">
    <div class="results-count" id="results-count">Loading courses...</div>
  </div>
  <!-- #### END RESULTS BAR #### -->

  <!-- #### COURSES GRID #### -->
  <div class="courses-grid" id="courses-grid">
    <div class="loading-state"><div class="spinner"></div>Loading courses...</div>
  </div>
  <!-- #### END COURSES GRID #### -->

  <!-- #### COURSES SCRIPTS #### -->
  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:"AIzaSyCpXYFftiB-agrY44eGKdFyUPm-t7FXbUk",
      authDomain:"kolamdata.firebaseapp.com",
      projectId:"kolamdata",
      storageBucket:"kolamdata.firebasestorage.app",
      messagingSenderId:"16403132310",
      appId:"1:16403132310:web:464c4ad2d19812f95077b7"
    };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allCourses=[], activeFilter="all", searchTerm="";
    const bgMap={"AI":"thumb-ai","Soft Skills":"thumb-soft","Personal Development":"thumb-personal","Education":"thumb-education"};

    // #### LOAD COURSES ####
    async function loadCourses() {
      try {
        const q=query(collection(db,"courses"),where("isPublished","==",true));
        const snap=await getDocs(q);
        allCourses=[];
        snap.forEach(d=>allCourses.push({id:d.id,...d.data()}));
        renderCourses();
      } catch(err) {
        document.getElementById("courses-grid").innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load courses</h3><p>${err.message}</p></div>`;
      }
    }
    // #### END LOAD COURSES ####

    // #### RENDER COURSES ####
    function renderCourses() {
      const grid=document.getElementById("courses-grid");
      const count=document.getElementById("results-count");
      let filtered=allCourses.filter(c=>{
        const mf=activeFilter==="all"?true:activeFilter==="free"?c.isFree===true:activeFilter==="paid"?c.isFree!==true:c.category===activeFilter;
        const ms=searchTerm===""||c.title.toLowerCase().includes(searchTerm)||(c.description||"").toLowerCase().includes(searchTerm)||(c.category||"").toLowerCase().includes(searchTerm);
        return mf&&ms;
      });
      count.innerHTML=`Showing <strong>${filtered.length}</strong> of <strong>${allCourses.length}</strong> courses`;
      if(filtered.length===0){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><h3>No courses found</h3><p>Try a different filter or search term.</p></div>`;return;}
      grid.innerHTML=filtered.map(c=>{
        const isFree=c.isFree===true;
        const price=isFree?"FREE":`RM ${parseFloat(c.price||0).toFixed(2)}`;
        const bgCls=bgMap[c.category]||"thumb-default";
        const modules=c.modules?c.modules.length:0;
        return `<div class="course-card" onclick="location.href='course.html?id=${c.id}'">
          <div class="course-thumb ${bgCls}"><span class="thumb-emoji">${c.thumbnailEmoji||"📚"}</span><span class="course-badge badge ${isFree?"badge-free":"badge-paid"}">${price}</span></div>
          <div class="course-body">
            <div class="course-category">${c.category||"General"}</div>
            <h3 class="course-title">${c.title}</h3>
            <p class="course-desc">${c.description||""}</p>
            <div class="course-meta">${c.totalDuration?`<span>⏱ ${c.totalDuration}</span>`:""} ${modules?`<span>📄 ${modules} modules</span>`:""} <span>🏆 Certificate</span></div>
            <div class="course-footer">
              <div class="course-price ${isFree?"free":""}">${price}</div>
              <button class="btn ${isFree?"btn-success":"btn-primary"} btn-sm" onclick="event.stopPropagation();location.href='course.html?id=${c.id}'">${isFree?"Start Free":"Enroll Now"}</button>
            </div>
          </div>
        </div>`;
      }).join("");
    }
    // #### END RENDER COURSES ####

    // #### FILTER PILLS ####
    document.querySelectorAll(".filter-pill").forEach(pill=>{
      pill.addEventListener("click",()=>{
        document.querySelectorAll(".filter-pill").forEach(p=>p.classList.remove("active"));
        pill.classList.add("active");
        activeFilter=pill.dataset.filter;
        renderCourses();
      });
    });
    // #### END FILTER PILLS ####

    // #### SEARCH ####
    document.getElementById("search-input").addEventListener("input",(e)=>{searchTerm=e.target.value.toLowerCase().trim();renderCourses();});
    // #### END SEARCH ####

    // #### URL PARAMS ####
    const params=new URLSearchParams(window.location.search);
    if(params.get("filter")==="free"){activeFilter="free";document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter==="free"));}
    if(params.get("cat")){activeFilter=params.get("cat");document.querySelectorAll(".filter-pill").forEach(p=>p.classList.toggle("active",p.dataset.filter===activeFilter));}
    // #### END URL PARAMS ####

    // #### AUTH STATE ####
    onAuthStateChanged(auth,(user)=>{
      const navGuest=document.getElementById("nav-guest"),navUser=document.getElementById("nav-user");
      const navMobileGuest=document.getElementById("nav-mobile-guest"),navMobileUser=document.getElementById("nav-mobile-user");
      if(user){
        navGuest?.classList.add("hidden");navUser?.classList.remove("hidden");
        navMobileGuest?.classList.add("hidden");navMobileUser?.classList.remove("hidden");
        const name=user.displayName||"User";
        document.getElementById("nav-user-name").textContent=name;
        document.getElementById("nav-avatar-initials").textContent=name.charAt(0).toUpperCase();
        document.getElementById("dropdown-name").textContent=name;
        document.getElementById("dropdown-email").textContent=user.email;
      } else {
        navGuest?.classList.remove("hidden");navUser?.classList.add("hidden");
        navMobileGuest?.classList.remove("hidden");navMobileUser?.classList.add("hidden");
      }
    });
    // #### END AUTH STATE ####

    // #### LOGOUT ####
    document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth).then(()=>location.href="index.html"));
    document.getElementById("btn-logout-mobile")?.addEventLi
